name: Build Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --onefile `
            --name SeismicDisasterTracker `
            --add-data "templates;templates" `
            --add-data "static;static" `
            app.py

      - name: Create release package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release
          Copy-Item dist\SeismicDisasterTracker.exe release\SeismicDisasterTracker.exe
          Copy-Item README.md release\README.md
          if (Test-Path LICENSE) { Copy-Item LICENSE release\LICENSE }
          Compress-Archive -Path release\* -DestinationPath SeismicDisasterTracker-Windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeismicDisasterTracker-Windows
          path: SeismicDisasterTracker-Windows.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SeismicDisasterTracker-Windows.zip
